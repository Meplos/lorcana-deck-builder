version: "2"
sql:
  - schema: "./sqlc/schema.sql"       # Où se trouve la structure de ta DB
    queries: "./sqlc/query.sql"       # Où tu vas écrire tes requêtes SQL
    engine: "sqlite"           # Moteur SQLite
    gen:
      go:
        package: "database"          # Nom du package Go généré
        out: "internal/database/sql"              # Dossier où le code sera généré
